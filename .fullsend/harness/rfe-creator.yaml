agent: agents/rfe-creator.md
role: e2e
model: opus
policy: policies/rfe-creator.yaml
timeout_minutes: 30

skills:
  - ../.claude/skills/rfe.speedrun
  - ../.claude/skills/rfe.create
  - ../.claude/skills/rfe.review
  - ../.claude/skills/rfe.auto-fix
  - ../.claude/skills/rfe.split
  - ../.claude/skills/rfe.submit

pre_script: scripts/pre-fetch.sh
post_script: scripts/post-submit.sh

validation_loop:
  script: scripts/validate-artifacts.sh
  max_iterations: 1

env:
  runner:
    FULLSEND_WORK_ITEM_URL: "${FULLSEND_WORK_ITEM_URL}"
    JIRA_SERVER: "${JIRA_SERVER}"
    JIRA_USER: "${JIRA_USER}"
    JIRA_TOKEN: "${JIRA_TOKEN}"
    JIRA_PROJECT: "${JIRA_PROJECT}"
  sandbox:
    FULLSEND_WORK_ITEM_URL: "${FULLSEND_WORK_ITEM_URL}"
