agent: agents/rfe-creator.md
role: e2e
model: opus
policy: policies/rfe-creator.yaml
timeout_minutes: 30

skills:
  - skills/rfe.speedrun
  - skills/rfe.create
  - skills/rfe.review
  - skills/rfe.auto-fix
  - skills/rfe.split
  - skills/rfe.submit

host_files:
  - src: env/gcp-vertex.env
    dest: /sandbox/workspace/.env.d/gcp-vertex.env
    expand: true
  - src: ${GOOGLE_APPLICATION_CREDENTIALS}
    dest: /tmp/.gcp-credentials.json
  - src: ${GCP_OIDC_TOKEN_FILE}
    dest: /sandbox/workspace/.gcp-oidc-token
    optional: true

pre_script: wrapper/pre-fetch.sh
post_script: wrapper/post-submit.sh

validation_loop:
  script: wrapper/validate-artifacts.sh
  max_iterations: 1

env:
  runner:
    FULLSEND_WORK_ITEM_URL: "${FULLSEND_WORK_ITEM_URL}"
    JIRA_SERVER: "${JIRA_SERVER}"
    JIRA_USER: "${JIRA_USER}"
    JIRA_TOKEN: "${JIRA_TOKEN}"
    JIRA_PROJECT: "${JIRA_PROJECT}"
